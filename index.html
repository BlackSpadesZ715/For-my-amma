<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Amma ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="intro" id="intro">
  <h1>For Amma ❤️</h1>
  <p>Tap to begin</p>
</div>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<section class="scene" id="scene1">
  <div class="flowers"></div>

  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>

  <div class="moon" id="moon"></div>

  <h2 class="text">She scolds me… but still feeds me extra.</h2>

  <div class="envelope" id="envelope">💌</div>
</section>

<div class="letter" id="letter">
  <p id="letterText"></p>
</div>

<canvas id="fireworks"></canvas>

<section class="memories">
  <img src="gfghf.jpeg" class="memory">
  <img src="rsf.jpeg" class="memory">
  <img src="sferg.jpeg" class="memory">
</section>

<section class="game">
  <h2>Amma’s love never stops… try to catch it ❤️</h2>
  <p id="score">0</p>
  <div id="gameArea"></div>
</section>

<section class="final">
  <h2>Amma…</h2>
  <p>You are my home… my everything ❤️</p>
</section>

<script src="script.js"></script>
</body>
</html>
